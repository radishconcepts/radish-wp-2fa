name: Bug Report
description: Something is broken or behaves unexpectedly.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report! Please fill in every required field — vague reports get closed.
        For security vulnerabilities, **do not** use this form. See [SECURITY.md](https://github.com/radishconcepts/radish-wp-2fa/blob/main/.github/SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Activate the plugin on a fresh WordPress install
        2. Go to Settings → Radish 2FA
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Radish 2FA version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: wp-version
    attributes:
      label: WordPress version
      placeholder: "6.7.1"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.2"
    validations:
      required: true

  - type: dropdown
    id: install-type
    attributes:
      label: Install type
      options:
        - Single site
        - Multisite (subdirectory)
        - Multisite (subdomain)
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low (cosmetic, minor inconvenience)
        - Medium (feature partially broken, workaround exists)
        - High (feature completely broken, no workaround)
        - Critical (data loss, lockout, auth bypass)
    validations:
      required: true

  - type: textarea
    id: other-2fa-plugins
    attributes:
      label: Other 2FA or login plugins active
      description: List any other 2FA, login, or security plugins that are active. They often conflict.

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      render: shell

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This is not a security vulnerability (those go to SECURITY.md).
          required: true
