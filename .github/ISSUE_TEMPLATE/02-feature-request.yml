name: Feature Request
description: Suggest an enhancement or new capability.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please describe the user problem first, then your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing problem, not the implementation. Who is blocked, and on what?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should the plugin behave? Settings, hooks, UI changes, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why you ruled them out.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Settings / configuration
        - Frontend setup or challenge flow
        - Recovery / lockout
        - Multisite behavior
        - Hooks / extensibility
        - Translation / i18n
        - Other
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
